<!DOCTYPE html>
<html>

<head>

<title>
Lite Restreamer Login
</title>


<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Inter,Arial,sans-serif;

background:
linear-gradient(
135deg,
#020617,
#0f172a
);

color:white;

}



.login-box{

width:380px;

padding:35px;

background:
rgba(15,23,42,.85);

border:1px solid #1e293b;

border-radius:25px;

box-shadow:
0 20px 50px rgba(0,0,0,.5);

backdrop-filter:blur(10px);

}



.logo{

text-align:center;

font-size:32px;

font-weight:800;

color:#38bdf8;

margin-bottom:10px;

}



.subtitle{

text-align:center;

color:#94a3b8;

margin-bottom:30px;

}



label{

display:block;

margin-bottom:8px;

color:#cbd5e1;

}



input{

width:100%;

padding:15px;

margin-bottom:20px;

background:#020617;

border:1px solid #334155;

border-radius:12px;

color:white;

font-size:16px;

}



input:focus{

outline:none;

border-color:#38bdf8;

}




button{

width:100%;

padding:15px;

border:0;

border-radius:14px;

background:#0284c7;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}



button:hover{

background:#0369a1;

transform:translateY(-2px);

}



.error{

text-align:center;

color:#f87171;

margin-top:15px;

display:none;

}



.footer{

text-align:center;

margin-top:25px;

color:#64748b;

font-size:13px;

}


</style>


</head>



<body>



<div class="login-box">


<div class="logo">

🚀 Lite Stream

</div>



<div class="subtitle">

Admin Panel Login

</div>



<label>
Username
</label>


<input 
id="u"
placeholder="Enter username"
autocomplete="username"
>



<label>
Password
</label>


<input 
id="p"
type="password"
placeholder="Enter password"
autocomplete="current-password"
>



<button onclick="l()">

🔐 Login

</button>



<div class="error" id="error">

Invalid username or password

</div>



<div class="footer">

Lite Restreamer V2.2

</div>



</div>





<script>


async function l(){


let button=
document.querySelector("button");


button.innerHTML="Logging in...";



let r=
await fetch(
"/api/login",
{

method:"POST",

headers:
{
"Content-Type":"application/json"
},


body:
JSON.stringify({

username:
document.getElementById("u").value,


password:
document.getElementById("p").value

})

});


let d=
await r.json();



if(d.success){

location="/dashboard.html";

}

else{


document.getElementById("error").style.display="block";


button.innerHTML="🔐 Login";


}


}


</script>



</body>

</html>
