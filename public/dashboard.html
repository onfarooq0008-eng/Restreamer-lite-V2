<!DOCTYPE html>
<html>

<head>

<title>Lite Restreamer Dashboard</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

</head>


<body>


<!-- Sidebar -->

<div class="sidebar">


<div class="logo">
🚀 Lite Stream
</div>


<div class="menu">

<a class="active" href="dashboard.html">
📊 Dashboard
</a>


<a href="videos.html">
🎬 Videos
</a>


<a href="channels.html">
📺 Channels
</a>


<a href="monitor.html">
📈 Monitor
</a>


<a href="settings.html">
⚙ Settings
</a>


</div>


</div>





<!-- Main Area -->

<div class="main">


<div class="topbar">

<h1>
Dashboard
</h1>


<div class="live-badge">

● System Online

</div>


</div>





<!-- Statistics -->


<div class="cards">


<div class="card">

<div class="icon">
🟢
</div>

<h3>
Stream Status
</h3>


<div class="value" id="status">
Checking...
</div>


</div>



<div class="card">

<div class="icon">
📊
</div>

<h3>
Bitrate
</h3>


<div class="value" id="bitrate">
0 kbps
</div>


</div>



<div class="card">

<div class="icon">
🎬
</div>

<h3>
Current Video
</h3>


<div class="value" id="current">
-
</div>


</div>



<div class="card">

<div class="icon">
⏱
</div>

<h3>
Duration
</h3>


<div class="value" id="uptime">
00:00
</div>


</div>


</div>







<!-- Quick Stream -->


<div class="panel">


<h2>
▶ Quick Stream
</h2>


<div class="form">


<label>
Select Video
</label>


<select id="video">
<option value="">Select Video</option>
</select>




<label>
Select Channel
</label>


<select id="channel">

<option>
Choose channel
</option>

</select>




<button onclick="startLive()">

🚀 Start Streaming

</button>


<button class="stop"
onclick="stopStream()">

⛔ Stop Stream

</button>


</div>


</div>








<!-- Server -->


<div class="panel">


<h2>
🖥 Server Information
</h2>


<div class="server-grid">


<div>
RAM
<strong id="ram">
-
</strong>
</div>



<div>
Server
<strong id="server">
Online
</strong>
</div>



<div>
Uptime
<strong id="serverTime">
-
</strong>
</div>


</div>


</div>




</div>






<script src="app.js"></script>


<script>


async function startLive(){


let response =
await fetch(
"/api/quick-start",
{

method:"POST",

headers:
{
"Content-Type":"application/json"
},


body:
JSON.stringify({

video:
document.getElementById("video").value,


channel:
document.getElementById("channel").value

})

});


let data =
await response.json();



alert(
data.status || "Stream Started"
);


}




async function stopStream(){


await fetch(

"/api/stream/stop",

{
method:"POST"
}

);


alert(
"Stream stopped"
);


}

async function loadVideos(){

    let res = await fetch("/api/videos");

    let videos = await res.json();


    let select = document.getElementById("video");

    select.innerHTML =
    '<option value="">Select Video</option>';


    videos.forEach(video=>{

        let option=document.createElement("option");

        option.value=video.path;

        option.textContent=video.name;


        select.appendChild(option);

    });

}


loadVideos();
  
</script>



</body>

</html>
